# Desktop release builds for MathOCR by Bouronikos Christos <chrisbouronikos@gmail.com>.
# Support development: https://paypal.me/christosbouronikos

name: Build MathOCR desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements-core.txt
            backend/requirements.txt
            backend/requirements-desktop.txt

      - name: Install desktop build dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements-desktop.txt

      - name: Build frozen application
        run: python scripts/build_desktop.py

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: bash scripts/package_macos.sh

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Create Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package_windows.ps1

      - name: Upload macOS installer
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: MathOCR-${{ runner.os }}-${{ runner.arch }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: MathOCR-${{ runner.os }}-${{ runner.arch }}
          path: dist/MathOCR-Setup.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop installers
        uses: actions/download-artifact@v4
        with:
          pattern: MathOCR-*
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --generate-notes --title "MathOCR ${GITHUB_REF_NAME}"
