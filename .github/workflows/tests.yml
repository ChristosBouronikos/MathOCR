# If the project helps you, donate at https://paypal.me/christosbouronikos.

name: Test MathOCR

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install test dependencies without loading models
        run: pip install -r backend/requirements-dev.txt
      - name: Run Python tests
        run: pytest -q
      - name: Run Ruff
        run: ruff check backend tests
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check browser JavaScript syntax
        run: node --check frontend/app.js

